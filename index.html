<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrot Script Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0b0f;
    --surface: #111318;
    --panel: #161a22;
    --border: #1e2430;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent-glow: rgba(0,229,255,0.15);
    --text: #e2e8f0;
    --muted: #64748b;
    --danger: #f43f5e;
    --success: #10b981;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s ease both;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .logo-line::before, .logo-line::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent));
    max-width: 200px;
  }

  .logo-line::after {
    background: linear-gradient(to left, transparent, var(--accent));
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Main grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 1.5rem;
  }

  @media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
    .output-panel { grid-column: 1; }
  }

  /* Panels */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .panel:nth-child(1) { animation-delay: 0.1s; }
  .panel:nth-child(2) { animation-delay: 0.2s; }
  .panel:nth-child(3) { animation-delay: 0.3s; grid-column: 1 / -1; }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.9rem 1.2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .panel-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }

  .panel-title {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
  }

  .panel-body { padding: 1.2rem; }

  /* Animal selector */
  .search-wrap {
    position: relative;
    margin-bottom: 0.8rem;
  }

  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem 0.6rem 2.2rem;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.85rem;
  }

  .select-list {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 260px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .select-list::-webkit-scrollbar { width: 4px; }
  .select-list::-webkit-scrollbar-track { background: transparent; }
  .select-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .animal-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.55rem 0.9rem;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 0.9rem;
  }

  .animal-item:last-child { border-bottom: none; }
  .animal-item:hover { background: rgba(0,229,255,0.05); }
  .animal-item.selected { background: rgba(0,229,255,0.1); }

  .animal-item input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px; height: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .animal-name { flex: 1; line-height: 1.2; }

  .select-count {
    margin-top: 0.6rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  .btn-clear {
    background: none;
    border: none;
    color: var(--danger);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    padding: 0;
    transition: opacity 0.2s;
  }
  .btn-clear:hover { opacity: 0.7; }

  /* Speed input */
  .field-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 0.5rem;
    display: block;
  }

  .speed-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.9rem;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }

  .speed-input:focus { border-color: var(--accent); }
  .speed-input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }

  /* Mode toggle */
  .toggle-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .toggle-btn {
    padding: 0.6rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .toggle-btn.active {
    background: rgba(0,229,255,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, var(--accent) 0%, #38bdf8 100%);
    border: none;
    border-radius: 8px;
    color: #0a0b0f;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,229,255,0.2);
  }

  .btn-generate:hover {
    box-shadow: 0 0 30px rgba(0,229,255,0.4);
    transform: translateY(-1px);
  }

  .btn-generate:active { transform: translateY(0); }

  /* Output */
  .output-panel { grid-column: 1 / -1; }

  .output-header-actions {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-left: auto;
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0.8rem;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.3);
    border-radius: 6px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .btn-copy:hover { background: rgba(0,229,255,0.2); }
  .btn-copy.copied { color: var(--success); border-color: var(--success); background: rgba(16,185,129,0.1); }

  .output-code {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #94d4e7;
    min-height: 160px;
    max-height: 380px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .output-code .kw { color: #c792ea; }
  .output-code .fn { color: #82aaff; }
  .output-code .str { color: #c3e88d; }
  .output-code .num { color: #f78c6c; }
  .output-code .comment { color: #546e7a; }
  .output-code.empty { color: var(--muted); font-style: italic; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Separator */
  .divider {
    grid-column: 1 / -1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
    margin: 0;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-line">
      <h1>Brainrot Script Gen</h1>
    </div>
    <p class="subtitle">Roblox Animation Script Generator</p>
  </header>

  <div class="grid">

    <!-- Box 1: Animal Selector -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-dot"></div>
        <span class="panel-title">Select Animals</span>
      </div>
      <div class="panel-body">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchInput" placeholder="Search animals..." oninput="filterAnimals()">
        </div>
        <div class="select-list" id="animalList"></div>
        <div class="select-count">
          <span id="selectedCount">0 selected</span>
          <button class="btn-clear" onclick="clearSelection()">Clear All</button>
        </div>
      </div>
    </div>

    <!-- Box 2: Options -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-dot" style="background:#a78bfa;box-shadow:0 0 8px #a78bfa;"></div>
        <span class="panel-title">Script Options</span>
      </div>
      <div class="panel-body">

        <label class="field-label">Animation Speed</label>
        <input class="speed-input" type="number" id="speedInput" value="1" step="0.1" min="0.01" max="100" placeholder="1">

        <label class="field-label">Script Mode</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="modeLoop" onclick="setMode('loop')">🔁 Loop</button>
          <button class="toggle-btn" id="modeSingle" onclick="setMode('single')">▶ Single Play</button>
        </div>

        <label class="field-label">Output Format</label>
        <div class="toggle-group">
          <button class="toggle-btn active" id="fmtLocal" onclick="setFormat('localscript')">LocalScript</button>
          <button class="toggle-btn" id="fmtScript" onclick="setFormat('script')">Script</button>
        </div>

        <br>
        <button class="btn-generate" onclick="generateScript()">⚡ Generate Script</button>

      </div>
    </div>

    <!-- Box 3: Output -->
    <div class="panel output-panel">
      <div class="panel-header">
        <div class="panel-dot" style="background:#10b981;box-shadow:0 0 8px #10b981;animation-delay:0.5s;"></div>
        <span class="panel-title">Generated Script</span>
        <div class="output-header-actions">
          <button class="btn-copy" id="copyBtn" onclick="copyScript()">⧉ Copy</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="output-code empty" id="outputCode">-- Your generated script will appear here...</div>
      </div>
    </div>

  </div>
</div>

];

let selected = new Set();
let mode = 'loop';
let format = 'localscript';

function renderList(filter = '') {
  const list = document.getElementById('animalList');
  list.innerHTML = '';
  const q = filter.toLowerCase();
  ANIMALS.forEach(name => {
    if (q && !name.toLowerCase().includes(q)) return;
    const div = document.createElement('div');
    div.className = 'animal-item' + (selected.has(name) ? ' selected' : '');
    div.innerHTML = `<input type="checkbox" ${selected.has(name) ? 'checked' : ''} onchange="toggle('${name.replace(/'/g,"\\'")}', this)"><span class="animal-name">${name}</span>`;
    div.onclick = (e) => { if (e.target.tagName !== 'INPUT') { toggle(name, div.querySelector('input')); } };
    list.appendChild(div);
  });
  updateCount();
}

function toggle(name, cb) {
  if (selected.has(name)) { selected.delete(name); if(cb) cb.checked = false; }
  else { selected.add(name); if(cb) cb.checked = true; }
  renderList(document.getElementById('searchInput').value);
}

function filterAnimals() { renderList(document.getElementById('searchInput').value); }
function clearSelection() { selected.clear(); renderList(document.getElementById('searchInput').value); }
function updateCount() {
  document.getElementById('selectedCount').textContent = selected.size + ' selected';
}

function setMode(m) {
  mode = m;
  document.getElementById('modeLoop').classList.toggle('active', m === 'loop');
  document.getElementById('modeSingle').classList.toggle('active', m === 'single');
}

function setFormat(f) {
  format = f;
  document.getElementById('fmtLocal').classList.toggle('active', f === 'localscript');
  document.getElementById('fmtScript').classList.toggle('active', f === 'script');
}

function generateScript() {
  const speed = parseFloat(document.getElementById('speedInput').value) || 1;
  const animals = [...selected];
  const out = document.getElementById('outputCode');

  if (animals.length === 0) {
    out.className = 'output-code empty';
    out.textContent = '-- Please select at least one animal.';
    return;
  }

  let lines = [];
  const RS = `game:GetService("ReplicatedStorage")`;
  const indent = '    ';

  lines.push(`-- Generated by Brainrot Script Gen`);
  lines.push(`-- Animals: ${animals.length} | Speed: ${speed} | Mode: ${mode}`);
  lines.push(``);

  if (format === 'localscript') {
    lines.push(`local Players = game:GetService("Players")`);
    lines.push(`local player = Players.LocalPlayer`);
    lines.push(`local character = player.Character or player.CharacterAdded:Wait()`);
    lines.push(`local humanoid = character:WaitForChild("Humanoid")`);
    lines.push(`local animator = humanoid:WaitForChild("Animator")`);
    lines.push(``);
  } else {
    lines.push(`local RS = game:GetService("ReplicatedStorage")`);
    lines.push(``);
  }

  lines.push(`local animations = {`);
  animals.forEach(name => {
    lines.push(`${indent}${RS}.Animations.Animals["${name}"],`);
  });
  lines.push(`}`);
  lines.push(``);
  lines.push(`local speed = ${speed}`);
  lines.push(``);

  if (mode === 'loop') {
    if (format === 'localscript') {
      lines.push(`while true do`);
      lines.push(`${indent}for _, animTrack in ipairs(animations) do`);
      lines.push(`${indent}${indent}local track = animator:LoadAnimation(animTrack)`);
      lines.push(`${indent}${indent}track:Play()`);
      lines.push(`${indent}${indent}track:AdjustSpeed(speed)`);
      lines.push(`${indent}${indent}track.Stopped:Wait()`);
      lines.push(`${indent}end`);
      lines.push(`end`);
    } else {
      lines.push(`-- Attach to character via server`);
      lines.push(`game.Players.PlayerAdded:Connect(function(player)`);
      lines.push(`${indent}player.CharacterAdded:Connect(function(character)`);
      lines.push(`${indent}${indent}local humanoid = character:WaitForChild("Humanoid")`);
      lines.push(`${indent}${indent}local animator = humanoid:WaitForChild("Animator")`);
      lines.push(`${indent}${indent}task.spawn(function()`);
      lines.push(`${indent}${indent}${indent}while true do`);
      lines.push(`${indent}${indent}${indent}${indent}for _, animTrack in ipairs(animations) do`);
      lines.push(`${indent}${indent}${indent}${indent}${indent}local track = animator:LoadAnimation(animTrack)`);
      lines.push(`${indent}${indent}${indent}${indent}${indent}track:Play()`);
      lines.push(`${indent}${indent}${indent}${indent}${indent}track:AdjustSpeed(speed)`);
      lines.push(`${indent}${indent}${indent}${indent}${indent}track.Stopped:Wait()`);
      lines.push(`${indent}${indent}${indent}${indent}end`);
      lines.push(`${indent}${indent}${indent}end`);
      lines.push(`${indent}${indent}end)`);
      lines.push(`${indent}end)`);
      lines.push(`end)`);
    }
  } else {
    if (format === 'localscript') {
      lines.push(`for _, animTrack in ipairs(animations) do`);
      lines.push(`${indent}local track = animator:LoadAnimation(animTrack)`);
      lines.push(`${indent}track:Play()`);
      lines.push(`${indent}track:AdjustSpeed(speed)`);
      lines.push(`${indent}track.Stopped:Wait()`);
      lines.push(`end`);
    } else {
      lines.push(`game.Players.PlayerAdded:Connect(function(player)`);
      lines.push(`${indent}player.CharacterAdded:Connect(function(character)`);
      lines.push(`${indent}${indent}local humanoid = character:WaitForChild("Humanoid")`);
      lines.push(`${indent}${indent}local animator = humanoid:WaitForChild("Animator")`);
      lines.push(`${indent}${indent}for _, animTrack in ipairs(animations) do`);
      lines.push(`${indent}${indent}${indent}local track = animator:LoadAnimation(animTrack)`);
      lines.push(`${indent}${indent}${indent}track:Play()`);
      lines.push(`${indent}${indent}${indent}track:AdjustSpeed(speed)`);
      lines.push(`${indent}${indent}${indent}track.Stopped:Wait()`);
      lines.push(`${indent}${indent}end`);
      lines.push(`${indent}end)`);
      lines.push(`end)`);
    }
  }

  out.className = 'output-code';
  out.textContent = lines.join('\n');
}

function copyScript() {
  const code = document.getElementById('outputCode').textContent;
  if (!code || code.startsWith('--') && code.includes('appear here')) return;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⧉ Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// Init
renderList();
</script>
</body>
